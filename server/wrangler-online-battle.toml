name = "jjk-online-battle"
main = "online-battle-worker.js"
compatibility_date = "2026-04-30"
workers_dev = true
preview_urls = true

[vars]
AI_PROVIDER = "ark_ai"
AI_BASE_URL = "https://ark.cn-beijing.volces.com/api/v3"
AI_CHAT_COMPLETIONS_URL = ""
AI_MODEL = "doubao-seed-2-0-lite-260215"
AI_MAX_TOKENS = "700"
AI_TEMPERATURE = "0.4"
AI_TIMEOUT_MS = "30000"
AI_ALLOWED_ORIGINS = "https://bigdogwoofwoof.pages.dev"
AI_ASSIST_DAILY_LIMIT = "5"
AI_ASSIST_MAX_TEXT_BYTES = "1000"
AI_HENAN_EXEMPT_RATE_LIMIT = "true"
AI_HENAN_REGION_HEADERS = "x-province,x-client-province,x-ip-region,x-real-region,x-forwarded-region,cf-region,cf-ipregion,cloudfront-viewer-country-region"
AI_HENAN_IP_CIDRS = ""
AI_ADMIN_ID = "ADMIN"

[[kv_namespaces]]
binding = "JJK_ONLINE_ROOMS"
id = "e18d34fbddaf413d9bb01ac69d8423ee"
